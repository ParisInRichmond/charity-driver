<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oakland Map — Charity Driver</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Lora:wght@400;700&display=swap" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Lora:wght@400;700&display=swap"></noscript>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    /* FIX: Leaflet popup default white bg override */
    .leaflet-popup-content-wrapper { background: #112240 !important; border: 1px solid rgba(245,166,35,0.3) !important; border-radius: 12px !important; box-shadow: 0 8px 32px rgba(0,0,0,0.5) !important; padding: 0 !important; }
    .leaflet-popup-content { margin: 0 !important; color: #fff; }
    .leaflet-popup-tip { background: #112240 !important; }
    .leaflet-popup-close-button { color: #F5A623 !important; font-size: 1.1rem !important; top: 8px !important; right: 10px !important; }
    /* FIX: Map layout — sidebar order on mobile (map first, sidebar below) */
    .map-layout { display: grid; grid-template-columns: 300px 1fr; height: calc(100vh - 64px); }
    #map { width: 100%; height: 100%; min-height: 300px; }
    .sidebar { background: var(--navy-mid); border-right: 1px solid rgba(245,166,35,0.15); overflow-y: auto; padding: 1.25rem; }
    .sidebar h2 { font-size: 1rem; font-weight: 700; margin-bottom: 0.25rem; }
    .sidebar .sub { font-size: 0.78rem; color: var(--gray); margin-bottom: 1rem; }
    .location-card { background: var(--navy); border: 1px solid rgba(245,166,35,0.1); border-radius: 12px; padding: 0.9rem; margin-bottom: 0.65rem; cursor: pointer; transition: border-color 0.2s; }
    .location-card:hover, .location-card.active { border-color: var(--gold); }
    .location-card h4 { font-size: 0.88rem; font-weight: 700; margin-bottom: 0.25rem; }
    .location-card .pop { font-size: 0.73rem; color: var(--gold); margin-bottom: 0.45rem; }
    .needs { display: flex; flex-wrap: wrap; gap: 0.3rem; }
    .need-tag { font-size: 0.68rem; background: rgba(245,166,35,0.1); color: var(--gold); border: 1px solid rgba(245,166,35,0.25); padding: 0.12rem 0.45rem; border-radius: 20px; }
    /* FIX: Mobile — map on top, sidebar scrollable below */
    @media(max-width:768px) {
      .map-layout { grid-template-columns: 1fr; grid-template-rows: 55vw 1fr; height: auto; min-height: calc(100vh - 64px); }
      #map { height: 55vw; min-height: 260px; }
      .sidebar { border-right: none; border-top: 1px solid rgba(245,166,35,0.15); max-height: 45vh; }
    }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="nav-logo">Charity Driver 🧡</a>
    <div class="nav-links">
      <a href="map.html">Map</a>
      <a href="guest.html">Browse</a>
      <a href="signup.html" class="nav-btn">Get Started</a>
    </div>
  </nav>

  <div class="page">
    <div class="map-layout">
      <div class="sidebar">
        <h2>📍 Oakland Hotspots</h2>
        <div class="sub">AI-identified high-need areas. Click any location to zoom in.</div>
        <div id="location-list"></div>
      </div>
      <div id="map"></div>
    </div>
  </div>

  <script>
    const locations = [
      { name: "Lake Merritt", lat: 37.8044, lng: -122.2577, pop: "~300 individuals", needs: ["Food","Water","Hygiene","Clothing"], insight: "Peak need: evenings. Highest demand for hygiene kits on weekends." },
      { name: "Downtown Oakland (12th St BART)", lat: 37.8033, lng: -122.2711, pop: "~450 individuals", needs: ["Food","Shelter Info","Blankets","Water"], insight: "Largest concentration in Oakland. Morning meal delivery most effective 7–9am." },
      { name: "Fruitvale BART", lat: 37.7749, lng: -122.2241, pop: "~200 individuals", needs: ["Food","Clothing","Water","Medical Info"], insight: "High foot traffic zone. Bilingual resources (Spanish) strongly needed here." },
      { name: "East 12th Street Corridor", lat: 37.7877, lng: -122.2299, pop: "~180 individuals", needs: ["Blankets","Food","Hygiene"], insight: "Dense encampment area. Best delivery window: late morning." },
      { name: "International Blvd (E. Oakland)", lat: 37.7694, lng: -122.2173, pop: "~220 individuals", needs: ["Food","Water","Clothing","Hygiene"], insight: "Spread across multiple blocks. Consistent need year-round." },
      { name: "West Oakland BART", lat: 37.8049, lng: -122.2951, pop: "~150 individuals", needs: ["Food","Blankets","Shelter Info"], insight: "Transit hub — many individuals in transit or temporary stay. Evening visits recommended." },
      { name: "Foothill Blvd (Deep East Oakland)", lat: 37.7608, lng: -122.1966, pop: "~140 individuals", needs: ["Food","Water","Clothing"], insight: "Underserved area. Very few donors reach here — high impact opportunity." },
      { name: "San Antonio Park", lat: 37.7876, lng: -122.2504, pop: "~90 individuals", needs: ["Food","Hygiene","Blankets"], insight: "Family-friendly drop zone nearby. Weekend visits see highest turnout." },
      { name: "Coliseum Area", lat: 37.7516, lng: -122.2006, pop: "~110 individuals", needs: ["Food","Water","Clothing"], insight: "Growing encampment. Morning deliveries most effective." },
      { name: "Laney College Area", lat: 37.7974, lng: -122.2588, pop: "~80 individuals", needs: ["Food","Hygiene","Shelter Info"], insight: "Close to social services — resource info delivery especially valuable here." }
    ];

    const map = L.map('map').setView([37.7895, -122.2400], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    // FIX: Apply dark filter only to tile layer, not the whole map (was breaking popup colors)
    // Using a dark tile URL instead of CSS filter
    // Keep mild filter but don't affect popups
    const mapEl = map.getContainer();
    const tilePane = map.getPanes().tilePane;
    if (tilePane) tilePane.style.filter = 'brightness(0.82) saturate(0.65)';

    // FIX: Larger click target on pins (14px was too small for mobile taps)
    const goldIcon = L.divIcon({
      className: '',
      html: `<div style="background:#F5A623;width:18px;height:18px;border-radius:50%;border:3px solid #fff;box-shadow:0 0 10px rgba(245,166,35,0.9);cursor:pointer"></div>`,
      iconSize: [18, 18], iconAnchor: [9, 9], popupAnchor: [0, -12]
    });

    const listEl = document.getElementById('location-list');
    const markers = [];

    locations.forEach((loc, i) => {
      const marker = L.marker([loc.lat, loc.lng], { icon: goldIcon }).addTo(map);
      // FIX: Popup content wrapped properly, padding added, mobile width capped
      marker.bindPopup(`
        <div style="font-family:Inter,sans-serif;min-width:200px;max-width:260px;color:#fff;padding:1rem;">
          <strong style="color:#F5A623;font-size:0.95rem;display:block;margin-bottom:4px">${loc.name}</strong>
          <span style="font-size:0.78rem;color:#8892b0">👥 ${loc.pop}</span>
          <div style="margin:0.6rem 0;display:flex;flex-wrap:wrap;gap:4px">
            ${loc.needs.map(n => `<span style="background:rgba(245,166,35,0.15);color:#F5A623;border:1px solid rgba(245,166,35,0.3);padding:2px 8px;border-radius:20px;font-size:0.68rem">${n}</span>`).join('')}
          </div>
          <div style="background:rgba(245,166,35,0.06);border:1px solid rgba(245,166,35,0.2);border-radius:8px;padding:8px;font-size:0.73rem;color:#8892b0;margin-top:6px;line-height:1.5">
            🤖 <strong style="color:#F5A623">AI Insight:</strong> ${loc.insight}
          </div>
          <a href="deliver.html" style="display:block;margin-top:10px;background:#F5A623;color:#0A1628;font-weight:700;text-align:center;padding:9px;border-radius:8px;text-decoration:none;font-size:0.82rem">🚗 Deliver Here</a>
        </div>
      `, { maxWidth: 290, minWidth: 200 });
      markers.push(marker);

      // Sidebar card
      const card = document.createElement('div');
      card.className = 'location-card';
      card.innerHTML = `
        <h4>${loc.name}</h4>
        <div class="pop">👥 ${loc.pop}</div>
        <div class="needs">${loc.needs.map(n => `<span class="need-tag">${n}</span>`).join('')}</div>
        <div class="ai-insight" style="margin-top:0.5rem;font-size:0.75rem">🤖 <strong>AI:</strong> ${loc.insight}</div>
      `;
      card.addEventListener('click', () => {
        map.setView([loc.lat, loc.lng], 15);
        markers[i].openPopup();
        document.querySelectorAll('.location-card').forEach(c => c.classList.remove('active'));
        card.classList.add('active');
      });
      listEl.appendChild(card);
    });
  </script>
</body>
</html>
