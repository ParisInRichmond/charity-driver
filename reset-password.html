<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — Charity Driver</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .auth-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 6rem 1.5rem 3rem; }
    .auth-box { background: var(--navy-mid); border: 1px solid rgba(245,166,35,0.2); border-radius: 20px; padding: 2.5rem; width: 100%; max-width: 440px; }
    .auth-box h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 0.4rem; }
    .auth-box .sub { color: var(--gray); font-size: 0.9rem; margin-bottom: 2rem; }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="nav-logo">
      <img src="logo.svg" alt="Charity Driver" />
      <span class="nav-logo-text">Charity <span>Driver</span></span>
    </a>
  </nav>

  <div class="page">
    <div class="auth-wrap">
      <div class="auth-box">
        <h1>Set new password 🔐</h1>
        <div class="sub">Choose a strong password you'll remember.</div>
        <div id="error-msg" class="error-msg"></div>
        <div id="success-msg" class="success-msg"></div>
        <form id="reset-form">
          <div class="form-group">
            <label>New Password</label>
            <div style="position:relative">
              <input type="password" id="password" placeholder="At least 6 characters" required style="padding-right:2.5rem"/>
              <span onclick="togglePass('password','eye1')" style="position:absolute;right:0.85rem;top:50%;transform:translateY(-50%);cursor:pointer;font-size:1.1rem" id="eye1">👁️</span>
            </div>
          </div>
          <div class="form-group">
            <label>Confirm New Password</label>
            <div style="position:relative">
              <input type="password" id="password-confirm" placeholder="Repeat password" required style="padding-right:2.5rem"/>
              <span onclick="togglePass('password-confirm','eye2')" style="position:absolute;right:0.85rem;top:50%;transform:translateY(-50%);cursor:pointer;font-size:1.1rem" id="eye2">👁️</span>
            </div>
          </div>
          <button type="submit" class="btn btn-primary" id="submit-btn" style="width:100%;margin-top:0.5rem">Update Password →</button>
        </form>
      </div>
    </div>
  </div>

  <script type="module">
    import { supabase } from './supabase.js'

    window.togglePass = function(fieldId, eyeId) {
      const input = document.getElementById(fieldId)
      const eye = document.getElementById(eyeId)
      input.type = input.type === 'password' ? 'text' : 'password'
      eye.textContent = input.type === 'password' ? '👁️' : '🙈'
    }

    document.getElementById('reset-form').addEventListener('submit', async (e) => {
      e.preventDefault()
      const errorEl = document.getElementById('error-msg')
      const successEl = document.getElementById('success-msg')
      const btn = document.getElementById('submit-btn')
      errorEl.style.display = 'none'

      const password = document.getElementById('password').value
      const confirm = document.getElementById('password-confirm').value

      if (password !== confirm) {
        errorEl.textContent = 'Passwords do not match.'
        errorEl.style.display = 'block'
        return
      }
      if (password.length < 6) {
        errorEl.textContent = 'Password must be at least 6 characters.'
        errorEl.style.display = 'block'
        return
      }

      btn.textContent = 'Updating...'
      btn.style.opacity = '0.7'
      btn.style.pointerEvents = 'none'

      const { error } = await supabase.auth.updateUser({ password })
      if (error) {
        errorEl.textContent = error.message
        errorEl.style.display = 'block'
        btn.textContent = 'Update Password →'
        btn.style.opacity = '1'
        btn.style.pointerEvents = 'auto'
      } else {
        successEl.textContent = '✅ Password updated! Redirecting to login...'
        successEl.style.display = 'block'
        setTimeout(() => window.location.href = 'login.html', 2500)
      }
    })
  </script>
</body>
</html>
