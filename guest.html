<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Explore Map — Charity Driver</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    .guest-banner { background: linear-gradient(135deg, rgba(245,166,35,0.15), rgba(245,166,35,0.05)); border-bottom: 1px solid rgba(245,166,35,0.3); padding: 0.75rem 1.5rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem; }
    .guest-banner p { font-size: 0.85rem; color: var(--light); }
    .map-layout { display: grid; grid-template-columns: 300px 1fr; height: calc(100vh - 64px - 48px); }
    #map { width: 100%; height: 100%; }
    .sidebar { background: var(--navy-mid); border-right: 1px solid rgba(245,166,35,0.15); overflow-y: auto; padding: 1.25rem; }
    .sidebar h2 { font-size: 1rem; font-weight: 700; margin-bottom: 0.25rem; }
    .sidebar .sub { font-size: 0.78rem; color: var(--gray); margin-bottom: 1rem; }
    .location-card { background: var(--navy); border: 1px solid rgba(245,166,35,0.1); border-radius: 10px; padding: 0.85rem; margin-bottom: 0.6rem; cursor: pointer; transition: border-color 0.2s; }
    .location-card:hover { border-color: var(--gold); }
    .location-card h4 { font-size: 0.85rem; font-weight: 700; margin-bottom: 0.2rem; }
    .location-card .pop { font-size: 0.72rem; color: var(--gold); margin-bottom: 0.4rem; }
    .need-tag { font-size: 0.68rem; background: rgba(245,166,35,0.1); color: var(--gold); border: 1px solid rgba(245,166,35,0.2); padding: 0.12rem 0.45rem; border-radius: 20px; display: inline-block; margin: 0.15rem 0.15rem 0 0; }
    @media(max-width:768px) { .map-layout { grid-template-columns: 1fr; grid-template-rows: 45vh 1fr; } }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="nav-logo">Charity Driver 🧡</a>
    <div class="nav-links">
      <a href="guest.html">Map</a>
      <a href="signup.html" class="nav-btn">Sign Up Free</a>
    </div>
  </nav>

  <div class="page" style="padding-top:64px">
    <div class="guest-banner">
      <p>👋 You're browsing as a guest. <strong>Sign up free</strong> to log deliveries and track your impact.</p>
      <a href="signup.html" class="btn btn-primary btn-sm">Join Now →</a>
    </div>

    <div class="map-layout">
      <div class="sidebar">
        <h2>📍 Oakland Hotspots</h2>
        <div class="sub">Click a location to explore. Sign up to start delivering.</div>
        <div id="location-list"></div>
      </div>
      <div id="map"></div>
    </div>
  </div>

  <script>
    const locations = [
      { name: "Lake Merritt", lat: 37.8044, lng: -122.2577, pop: "~300 individuals", needs: ["Food","Water","Hygiene","Clothing"] },
      { name: "Downtown Oakland (12th St BART)", lat: 37.8033, lng: -122.2711, pop: "~450 individuals", needs: ["Food","Shelter Info","Blankets","Water"] },
      { name: "Fruitvale BART", lat: 37.7749, lng: -122.2241, pop: "~200 individuals", needs: ["Food","Clothing","Water","Medical Info"] },
      { name: "East 12th Street Corridor", lat: 37.7877, lng: -122.2299, pop: "~180 individuals", needs: ["Blankets","Food","Hygiene"] },
      { name: "International Blvd", lat: 37.7694, lng: -122.2173, pop: "~220 individuals", needs: ["Food","Water","Clothing","Hygiene"] },
      { name: "West Oakland BART", lat: 37.8049, lng: -122.2951, pop: "~150 individuals", needs: ["Food","Blankets","Shelter Info"] },
      { name: "Foothill Blvd", lat: 37.7608, lng: -122.1966, pop: "~140 individuals", needs: ["Food","Water","Clothing"] },
      { name: "San Antonio Park", lat: 37.7876, lng: -122.2504, pop: "~90 individuals", needs: ["Food","Hygiene","Blankets"] },
      { name: "Coliseum Area", lat: 37.7516, lng: -122.2006, pop: "~110 individuals", needs: ["Food","Water","Clothing"] },
      { name: "Laney College Area", lat: 37.7974, lng: -122.2588, pop: "~80 individuals", needs: ["Food","Hygiene","Shelter Info"] }
    ];

    const map = L.map('map').setView([37.7895, -122.2400], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);
    map.getContainer().style.filter = 'brightness(0.85) saturate(0.7)';

    const goldIcon = L.divIcon({
      className: '',
      html: `<div style="background:#F5A623;width:13px;height:13px;border-radius:50%;border:3px solid #fff;box-shadow:0 0 8px rgba(245,166,35,0.8)"></div>`,
      iconSize: [13,13], iconAnchor: [6,6]
    });

    const listEl = document.getElementById('location-list');
    const markers = [];

    locations.forEach((loc, i) => {
      const marker = L.marker([loc.lat, loc.lng], { icon: goldIcon }).addTo(map);
      marker.bindPopup(`
        <div style="font-family:Inter,sans-serif;min-width:200px;color:#fff;background:#112240;padding:0.5rem">
          <strong style="color:#F5A623">${loc.name}</strong><br/>
          <span style="font-size:0.8rem;color:#8892b0">${loc.pop}</span>
          <div style="margin:0.5rem 0;display:flex;flex-wrap:wrap;gap:4px">
            ${loc.needs.map(n => `<span style="background:rgba(245,166,35,0.15);color:#F5A623;border:1px solid rgba(245,166,35,0.3);padding:2px 8px;border-radius:20px;font-size:0.7rem">${n}</span>`).join('')}
          </div>
          <a href="signup.html" style="display:block;margin-top:10px;background:#F5A623;color:#0A1628;font-weight:700;text-align:center;padding:8px;border-radius:8px;text-decoration:none;font-size:0.82rem">Sign Up to Deliver Here →</a>
        </div>
      `, { maxWidth: 260 });
      markers.push(marker);

      const card = document.createElement('div');
      card.className = 'location-card';
      card.innerHTML = `<h4>${loc.name}</h4><div class="pop">👥 ${loc.pop}</div><div>${loc.needs.map(n => `<span class="need-tag">${n}</span>`).join('')}</div>`;
      card.addEventListener('click', () => {
        map.setView([loc.lat, loc.lng], 15);
        markers[i].openPopup();
      });
      listEl.appendChild(card);
    });
  </script>
</body>
</html>
