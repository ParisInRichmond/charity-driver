<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In — Charity Driver</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .auth-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 6rem 1.5rem 3rem; }
    .auth-box { background: var(--navy-mid); border: 1px solid rgba(245,166,35,0.2); border-radius: 20px; padding: 2.5rem; width: 100%; max-width: 440px; }
    .auth-box h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 0.4rem; }
    .auth-box .sub { color: var(--gray); font-size: 0.9rem; margin-bottom: 2rem; }
    .error-msg { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); border-radius: 8px; padding: 0.75rem 1rem; font-size: 0.85rem; color: #f87171; margin-bottom: 1rem; display: none; }
    .signup-link { text-align: center; font-size: 0.85rem; color: var(--gray); margin-top: 1.25rem; }
    .signup-link a { color: var(--gold); font-weight: 600; text-decoration: none; }
    .forgot { text-align: right; font-size: 0.78rem; margin-top: -0.75rem; margin-bottom: 1rem; }
    .forgot a { color: var(--gold); text-decoration: none; }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="nav-logo">Charity Driver 🧡</a>
    <div class="nav-links">
      <a href="map.html">Map</a>
      <a href="guest.html">Browse</a>
      <a href="signup.html" class="nav-btn">Sign Up</a>
    </div>
  </nav>

  <div class="page">
    <div class="auth-wrap">
      <div class="auth-box">
        <h1>Welcome back 👋</h1>
        <div class="sub">Log in to your Charity Driver account.</div>

        <div id="error-msg" class="error-msg"></div>

        <form id="login-form">
          <div class="form-group"><label>Email Address</label><input type="email" id="email" placeholder="paris@example.com" required /></div>
          <div class="form-group"><label>Password</label><input type="password" id="password" placeholder="Your password" required /></div>
          <div class="forgot"><a href="#">Forgot password?</a></div>
          <button type="submit" class="btn btn-primary" id="submit-btn" style="width:100%">Log In →</button>
        </form>

        <div class="signup-link" style="margin-top:1.5rem">Don't have an account? <a href="signup.html">Sign up free</a></div>
        <div style="text-align:center;margin-top:0.75rem"><a href="guest.html" style="color:var(--gray);font-size:0.82rem;text-decoration:none">Continue as guest →</a></div>
      </div>
    </div>
  </div>

  <script type="module">
    import { supabase, redirectIfLoggedIn } from './supabase.js'

    redirectIfLoggedIn()

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault()
      const btn = document.getElementById('submit-btn')
      const errorEl = document.getElementById('error-msg')
      errorEl.style.display = 'none'
      btn.textContent = 'Logging in...'
      btn.style.opacity = '0.7'
      btn.style.pointerEvents = 'none'

      const { error } = await supabase.auth.signInWithPassword({
        email: document.getElementById('email').value.trim(),
        password: document.getElementById('password').value
      })

      if (error) {
        errorEl.textContent = error.message
        errorEl.style.display = 'block'
        btn.textContent = 'Log In →'
        btn.style.opacity = '1'
        btn.style.pointerEvents = 'auto'
        return
      }

      window.location.href = 'dashboard.html'
    })
  </script>
</body>
</html>
